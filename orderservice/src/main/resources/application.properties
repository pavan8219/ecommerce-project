spring.application.name=orderservice
server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3308/users
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=*
management.info.env.enabled=true
management.endpoint.gateway.access=unrestricted

info.app.name=Order Service
info.app.description=Product service in dev mode
info.app.version=1.0.0

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=payment-group-v1

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.value.default.type=com.ecommerce.orderservice.kafka.PaymentEvent