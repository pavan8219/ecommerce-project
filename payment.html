<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Payment Demo</title>

    <!-- Razorpay Checkout SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0, 0, 0, .2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
        }

        button:hover {
            background: darkgreen;
        }

        pre {
            background: #eee;
            padding: 10px;
            overflow: auto;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Payment Demo</h2>

        <input type="text" id="orderId" placeholder="Order Id" value="101">

        <input type="number" id="amount" placeholder="Amount" value="500">

        <button onclick="pay()">Pay Now</button>

        <h3>Response</h3>

        <pre id="result"></pre>

    </div>

    <script>

        // Change this if you're using API Gateway
        const PAYMENT_SERVICE_URL = "http://localhost:8080/payment/api/payments";
        const token="eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiI0IiwiZW1haWwiOiJwYXZhbkBnbWFpbC5jb20iLCJpYXQiOjE3ODM1OTEwNzUsImV4cCI6MTc4MzY3NzQ3NX0.uoWzRB5JmUFJuo6QLJPk1Jg9KXyWuoGoh9V8rQ_AfJE"
        async function pay() {

            const orderId = document.getElementById("orderId").value;
            const amount = document.getElementById("amount").value;
            const createPaymentRequest = {
                orderId: orderId,
                amount: Number(amount),
                currency: "INR",
                provider: "RAZORPAY"
            };

            console.log("payment reqq",createPaymentRequest)

            try {
                const response = await fetch(PAYMENT_SERVICE_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(createPaymentRequest)
                });

                const paymentResponse = await response.json();
                console.log("Paymentresponse", paymentResponse);
                document.getElementById("result").innerHTML =
                JSON.stringify(paymentResponse, null, 2);
                openCheckout(paymentResponse,token);
            }
            catch (err) {
                alert(err);
            }

        }

        function openCheckout(paymentResponse,token) {
            var options = {
                key: paymentResponse.keyId,
                amount: paymentResponse.amount * 100,
                currency: paymentResponse.currency,
                order_id: paymentResponse.gatewayOrderId,
                name: "E-Commerce",
                description: "Order Payment",
                handler: async function (response) {
                    console.log(response);
                    const verifyRequest = {
                        paymentId: paymentResponse.paymentId,
                        gatewayPaymentId: response.razorpay_payment_id,
                        gatewaySignature: response.razorpay_signature
                    };
                    const verifyResponse = await fetch(
                        PAYMENT_SERVICE_URL + "/verify",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                 "Authorization": `Bearer ${token}`
                            },
                            body: JSON.stringify(verifyRequest)
                        });
                    const verifyResult = await verifyResponse.json();
                    alert("Payment Verified");
                    console.log("payment verification result", verifyResult);
                },
                theme: {
                    color: "#3399cc"
                }
            };
            var rzp = new Razorpay(options);
            rzp.open();
        }

    </script>
</body>

</html>
